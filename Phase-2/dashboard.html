<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 1: Financial Churn Analysis Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #ffffff;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #c0c0c0;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .question-section {
            background-color: #0a0a0a;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #1a1a1a;
        }

        .question-section h3 {
            font-size: 1.2rem;
            color: #ffffff;
            line-height: 1.6;
            font-weight: 500;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .chart-container {
            background-color: #0a0a0a;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            border: 1px solid #1a1a1a;
            transition: all 0.3s ease;
        }

        .chart-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .chart-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #ffffff;
            font-weight: 500;
            border-bottom: 2px solid #404040;
            padding-bottom: 10px;
        }

        .heatmap-cell {
            stroke: #000000;
            stroke-width: 2;
            cursor: pointer;
        }

        .heatmap-cell:hover {
            stroke: #ffffff;
            stroke-width: 3;
        }

        .axis text {
            fill: #b0b0b0;
            font-size: 11px;
        }

        .axis line, .axis path {
            stroke: #404040;
        }

        .axis-label {
            fill: #e0e0e0;
            font-size: 12px;
        }

        .tooltip {
            position: absolute;
            background-color: rgba(10, 10, 10, 0.95);
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 13px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 1400px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Customer Churn Analysis</h1>
        </header>

        <div class="question-section">
            <h3>Question-1: Among the churned customers, was the reason for churning financial instability, low
loyalty or simply loss of interest?</h3>
        </div>

        <div class="dashboard-grid">
            <div class="chart-container">
                <h3 class="chart-title">Heatmap 1: Churn Density Map</h3>
                <div id="chart1"></div>
            </div>

            <div class="chart-container">
                <h3 class="chart-title">Heatmap 2: Home Ownership Map</h3>
                <div id="chart2"></div>
            </div>

            <div class="chart-container">
                <h3 class="chart-title">Heatmap 3: Credit Quality Map</h3>
                <div id="chart3"></div>
            </div>

            <div class="chart-container">
                <h3 class="chart-title">Heatmap 4: Home Market Value Map</h3>
                <div id="chart4"></div>
            </div>
        </div>
    </div>

    <div class="tooltip"></div>

    <script src="heatmap1_churn.js"></script>
    <script src="heatmap2_homeowner.js"></script>
    <script src="heatmap3_credit.js"></script>
    <script src="heatmap4_homevalue.js"></script>
</body>
</html>
